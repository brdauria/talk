<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Level partition for state-dependent barriers</title>
  <desc id="desc">A vector of upper thresholds induces ordered levels and active states on each interval.</desc>
  <rect width="880" height="460" rx="18" fill="#ffffff"/>
  <line x1="118" y1="398" x2="118" y2="58" stroke="#111827" stroke-width="2.5"/>
  <text x="76" y="60" font-size="22" fill="#111827">level</text>
  <line x1="100" y1="398" x2="760" y2="398" stroke="#111827" stroke-width="2.5"/>

  <g stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="8 7">
    <line x1="118" y1="350" x2="790" y2="350"/>
    <line x1="118" y1="278" x2="790" y2="278"/>
    <line x1="118" y1="206" x2="790" y2="206"/>
    <line x1="118" y1="134" x2="790" y2="134"/>
    <line x1="118" y1="72" x2="790" y2="72"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="22" fill="#374151">
    <text x="43" y="357">ell0=0</text>
    <text x="62" y="285">ell1</text>
    <text x="62" y="213">ell2</text>
    <text x="62" y="141">ell3</text>
    <text x="34" y="80">infty</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="210" y="278" width="74" height="120" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2.5"/>
    <text x="247" y="266" font-size="23" fill="#1e3a8a">a1</text>
    <circle cx="247" cy="278" r="6" fill="#1d4ed8"/>

    <rect x="388" y="206" width="74" height="192" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2.5"/>
    <text x="425" y="194" font-size="23" fill="#064e3b">a2</text>
    <circle cx="425" cy="206" r="6" fill="#047857"/>

    <rect x="566" y="134" width="74" height="264" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2.5"/>
    <text x="603" y="122" font-size="23" fill="#78350f">a3</text>
    <circle cx="603" cy="134" r="6" fill="#b45309"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="20" fill="#111827">
    <text x="680" y="245">Ik = [ell_k, ell_{k+1})</text>
    <path d="M668,251 L610,210" stroke="#111827" stroke-width="2" fill="none"/>
    <rect x="682" y="288" width="150" height="42" rx="10" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="698" y="315" font-size="19" fill="#374151">active states</text>
    <text x="698" y="352" font-size="18" fill="#374151">E_k = {i: ell_k &lt; a_i}</text>
  </g>

  <text x="178" y="427" font-size="20" fill="#6b7280">state 1</text>
  <text x="356" y="427" font-size="20" fill="#6b7280">state 2</text>
  <text x="534" y="427" font-size="20" fill="#6b7280">state 3</text>
</svg>
